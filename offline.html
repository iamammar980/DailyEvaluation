<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غير متصل — إيفا</title>
<style>
  :root{--teal:#14746b;--navy:#001c2a}
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:"Cairo","Segoe UI",Tahoma,sans-serif;text-align:center;padding:24px;
    color:#fff;background:var(--navy);
    background-image:radial-gradient(1100px 760px at 78% 0%,rgba(31,167,146,.25),transparent 60%),
      linear-gradient(160deg,#001c2a,#0a3d56 55%,#0c5b52);
  }
  .card{max-width:420px}
  .icon{font-size:56px;margin-bottom:18px}
  h1{font-size:24px;font-weight:800;margin-bottom:10px}
  p{font-size:15px;line-height:1.9;color:rgba(255,255,255,.8)}
  a.btn{
    display:inline-block;margin-top:22px;padding:14px 34px;border-radius:999px;
    background:#fff;color:var(--navy);text-decoration:none;font-weight:700;font-size:15px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📴</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>سيفتح التطبيق من النسخة المحفوظة على هذا الجهاز، وستُزامَن بياناتك تلقائياً عند عودة الاتصال.</p>
    <a class="btn" href="/index.html">فتح التطبيق</a>
  </div>
</body>
</html>
